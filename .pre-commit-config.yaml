repos:
# Check EOF newline
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: end-of-file-fixer
# Insert license headers
- repo: https://github.com/Lucas-C/pre-commit-hooks
  rev: v1.5.6
  hooks:
  # Commit-time: insert missing headers and bump the year to the current one.
  - id: insert-license
    name: Insert license header (.c,.cpp,.h)
    files: \.(c|cpp|h)$
    # Third-party / sample sources carry their own license headers
    exclude: ^(components/rmaker_time_sync/src/timezone\.c|src/create_APN3_PPI_string\.c)$
    stages: [pre-commit]
    args:
    - --license-filepath
    - .pre-commit/license_header.txt
    - --comment-style
    - /*| *| */
    - --use-current-year
  # CI (run with --hook-stage manual): only check headers exist; keep past years as-is.
  - id: insert-license
    name: Check license header (.c,.cpp,.h) [allow past years]
    files: \.(c|cpp|h)$
    exclude: ^(components/rmaker_time_sync/src/timezone\.c|src/create_APN3_PPI_string\.c)$
    stages: [manual]
    args:
    - --license-filepath
    - .pre-commit/license_header.txt
    - --comment-style
    - /*| *| */
    - --allow-past-years
